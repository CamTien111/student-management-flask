{% extends 'base.html' %}
{% block auth_content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #1a237e, #283593);">
  <div class="card p-4" style="width: 400px;">
    <div class="text-center mb-4">
      <i class="bi bi-mortarboard-fill text-primary" style="font-size: 3rem;"></i>
      <h4 class="mt-2 fw-bold">Hệ thống Quản Lý Sinh Viên</h4>
      <p class="text-muted small">Đăng nhập để tiếp tục</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Tên đăng nhập</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Mật khẩu</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
      </button>
    </form>
    <div class="text-center mt-3">
      <small class="text-muted"></small>
    </div>
  </div>
</div>
{% endblock %}
